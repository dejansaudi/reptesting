name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_call:

defaults:
  run:
    working-directory: 03_PRODUCTION/validately

jobs:
  # ─── Lint & Type Check ───
  quality:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: 03_PRODUCTION/validately/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
      - run: pnpm exec prisma generate --schema=packages/db/prisma/schema.prisma
      - run: pnpm exec tsc --noEmit --project apps/web/tsconfig.json || true

  # ─── Unit Tests ───
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: 03_PRODUCTION/validately/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
      - run: pnpm exec prisma generate --schema=packages/db/prisma/schema.prisma
      - run: cd packages/shared && pnpm exec vitest run --passWithNoTests

  # ─── Build Check ───
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: 03_PRODUCTION/validately/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
      - run: pnpm exec prisma generate --schema=packages/db/prisma/schema.prisma
      - run: cd apps/web && pnpm exec next build
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
