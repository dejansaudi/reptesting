name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

defaults:
  run:
    working-directory: 03_PRODUCTION/validately

jobs:
  # ─── Lint & Type Check ───
  quality:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 03_PRODUCTION/validately/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx tsc --noEmit --project apps/web/tsconfig.json || true

  # ─── Unit Tests ───
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 03_PRODUCTION/validately/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: cd packages/shared && npx vitest run --passWithNoTests

  # ─── Build Check ───
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 03_PRODUCTION/validately/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: cd apps/web && npx next build
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
