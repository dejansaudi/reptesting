// Utility functions
function qScore(v){
  if(!v||!v.trim())return{t:0,s:0,e:0,a:0};const x=v.trim();
  let s=0,e=0,a=0;
  if(x.length>20)s++;if(x.length>60)s++;if(x.length>120)s++;
  if(/specific|exact|\d/.test(x))s++;if(/everyone|disrupt|synergy/i.test(x))s=Math.max(0,s-2);s=Math.min(5,s);
  if(/\d/.test(x))e++;if(/\$|€|£/.test(x))e++;if(/\d+%|\d+x/i.test(x))e++;
  if(/interview|survey|data|research|tested/i.test(x))e++;e=Math.min(5,e);
  if(/will|plan|test|launch|build|ship/i.test(x))a++;if(/week|month|day|quarter/i.test(x))a++;
  if(x.length>40)a++;if(/step|first|then|next/i.test(x))a++;a=Math.min(5,a);
  return{t:Math.round(((s+e+a)/15)*100),s,e,a};
}

function cleanKey(k){return k.replace(/[^\x20-\x7E]/g,"").trim();}

async function askAI(key,sys,msg){
  const safeKey=cleanKey(key);
  if(!safeKey||!safeKey.startsWith("sk-")){return"⚠️ Invalid API key. Please re-enter your key in Settings (should start with sk-ant-).";}
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":safeKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-5-20250929",max_tokens:900,system:sys,messages:[{role:"user",content:msg}]})
    });
    if(!r.ok){const t=await r.text();try{const j=JSON.parse(t);throw new Error(j.error?.message||t);}catch(pe){if(pe.message!==t)throw pe;throw new Error(t);}}
    return(await r.json()).content[0].text;
  }catch(e){return`⚠️ ${e.message.substring(0,200)}`;}
}

const AI_SYS=`You are a brutally honest startup coach inside Validately (validately.io) — an AI-powered startup validation platform.

Your job: CHALLENGE the user's thinking. Find WEAKNESSES. Push for evidence.

RULES:
- Be direct, critical, no fluff
- Point out specific weaknesses
- Ask 1-2 follow-up questions exposing blind spots
- Reference validation gates: problem validated? PMF measured? Unit economics positive?
- Compare against benchmarks: 20+ interviews, 40%+ PMF, LTV:CAC>3:1
- Call out buzzwords without substance
- Demand numbers
- Flag untested assumptions
- 4-6 sentences MAX
- End with ONE pointed question

FRAMEWORKS YOU KNOW (reference contextually):
Stage 0 DIAGNOSE: Pain/Barrier Matrix (pain 1-5, barrier 1-5), Strategy Canvas (eliminate/reduce/raise/create), Market Stage targeting (innovators→laggards)
Stage 1 DISCOVER: Empathy Map (Think&Feel/See/Hear/Say&Do), Value Prop Canvas Customer Profile (Jobs/Pains/Gains), customer interviews
Stage 2 DEFINE: Value Map (Pain Relievers/Gain Creators), Prototype Level (Whiteboard→MVP), feature prioritization
Stage 3 VALIDATE: Business Model Canvas (9 blocks), Experiment Framework (Hypothesis→Build→Measure→Learn), PMF measurement
Stage 4 IGNITE: Get/Keep/Grow framework, Channel Economics (conversion rates, CAC per channel), beachhead strategy
Stage 5 DEPLOY: Nail It Then Scale It (Discovery→Validation→Efficiency→Scale), OMTM methodology (Ideate→Analyze→Rank→Execute→Systemize), experiment backlog
Stage 6 DOMINATE: Peter Thiel 7 Powers Scorecard (Engineering/Timing/Monopoly/People/Distribution/Durability/Secret), Long-Term Vision (Purpose/Mission/Values), Gartner Analytics Maturity

CROSS-REFERENCE: When reviewing one framework, reference related ones. E.g., if Empathy Map says X, does Value Prop Canvas match? If BMC channels say Y, does Get/Keep/Grow align? If Thiel scores are low, what does that mean for their PMF claim?

Validately 7-stage method: Diagnose→Discover→Define→Validate→Ignite→Deploy→Dominate.`;

function Ring({pct,size=56,stroke=4,color,children}){
  const r=(size-stroke)/2,ci=2*Math.PI*r;
  return React.createElement("div",{style:{position:"relative",width:size,height:size}},
    React.createElement("svg",{width:size,height:size,style:{transform:"rotate(-90deg)"}},

    ),
    React.createElement("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}},children)
  );
}

// Confetti component
function Confetti(){
  const canRef=useRef(null);
  useEffect(()=>{
    if(!canRef.current)return;
    const c=canRef.current.getContext("2d"),w=window.innerWidth,h=window.innerHeight;
    canRef.current.width=w;canRef.current.height=h;
    const conf=[];
    for(let i=0;i<50;i++){
      conf.push({x:Math.random()*w,y:Math.random()*h-h,vx:(Math.random()-0.5)*4,vy:Math.random()*2+2,life:1,color:["#5865f2","#eb459e","#f47b67","#23a559","#f0b232"][Math.floor(Math.random()*5)]});
    }
    const a=()=>{
      c.clearRect(0,0,w,h);
      for(const p of conf){
        p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.01;
        c.globalAlpha=p.life;c.fillStyle=p.color;c.fillRect(p.x,p.y,4,4);
      }
      if(conf.some(p=>p.life>0))requestAnimationFrame(a);
    };
    a();
  },[]);
  return React.createElement("canvas",{ref:canRef,style:{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none"}});
}

// Benchmark component
function Benchmark({stage,label,value,unit="",good="",ok="",bad=""}){
  // Support both old signature (stage-based) and new signature (value-based)
  if(stage!==undefined&&typeof stage==="number"){
    const bm=GATE_CRITERIA[stage];
    return React.createElement("div",{style:{backgroundColor:C.bg2,border:`1px solid ${C.borderLight}`,borderRadius:"6px",padding:"12px",marginTop:"8px",fontSize:"12px",color:C.text2}},
      React.createElement("div",{style:{fontWeight:"600",color:C.text,marginBottom:"8px"}},"Gate Checklist:"),
      React.createElement("ul",{style:{margin:0,paddingLeft:"20px",color:C.text2}},
        bm.criteria.map((c,i)=>React.createElement("li",{key:i,style:{marginBottom:"4px"}},c))
      )
    );
  }
  // New signature for value-based benchmarks
  let status="⚪";
  if(value){
    const v=parseFloat(value);
    if(bad&&v<parseFloat(bad))status="🔴";
    else if(ok&&v<parseFloat(ok))status="🟡";
    else if(good&&v>=parseFloat(good))status="🟢";
  }
  return React.createElement("div",{style:{padding:10,background:C.bg3,borderRadius:6,border:`1px solid ${C.border}`,marginBottom:10}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      React.createElement("div",null,
        React.createElement("div",{style:{fontSize:11,fontWeight:700,color:C.text}},`${status} ${label}`),
        React.createElement("div",{style:{fontSize:9,color:C.text3}},`${value}${unit}`)
      ),
      React.createElement("div",{style:{fontSize:9,color:C.text3,textAlign:"right"}},
        good&&`Good: ${good}${unit}`,
        ok&&React.createElement("div",null,`OK: ${ok}${unit}`),
        bad&&React.createElement("div",null,`Bad: <${bad}${unit}`)
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// runXV - Cross-validation across all stages
// ═══════════════════════════════════════════════════════════════════════════════

function runXV(data){
  const issues=[];
  for(let v of VCHECKS){
    if(!v.check(data)){
      issues.push({vcheck:v.id,stage:v.stage,msg:v.msg,severity:"warning"});
    }
  }
  return{passed:issues.length===0,issues:issues};
}

// calcIRS - Investor Readiness Score
// ═══════════════════════════════════════════════════════════════════════════════

function calcIRS(data){
  let score=0;
  const weights={0:120,1:120,2:110,3:130,4:110,5:110,6:120};
  const maxScore=Object.values(weights).reduce((a,b)=>a+b,0);

  for(let i=0;i<STAGES.length;i++){
    const criteria=GATE_CRITERIA[i]||[];
    let stagePass=0;
    for(let c of criteria){
      const val=data[c.field]||"";
      let pass=false;
      if(c.check==="required")pass=val.length>0;
      else if(c.check.startsWith("minLength:"))pass=val.length>=parseInt(c.check.split(":")[1]);
      else if(c.check.startsWith("minValue:"))pass=parseFloat(val||0)>=parseFloat(c.check.split(":")[1]);
      else if(c.check.startsWith("maxValue:"))pass=parseInt(val||999)<=parseInt(c.check.split(":")[1]);
      if(pass)stagePass++;
    }
    const stageScore=(stagePass/criteria.length)*weights[i];
    score+=stageScore;
  }

  let band="Pre-Seed";
  let bandColor=C.red;
  if(score>=500){band="Late-Stage";bandColor=C.green;}
  else if(score>=400){band="Growth";bandColor=C.yellow;}
  else if(score>=300){band="Series A";bandColor=C.yellow;}
  else if(score>=200){band="Seed";bandColor=C.orange;}
  else if(score>=100){band="MVP";bandColor=C.orange;}

  return{score:Math.round(score),maxScore:maxScore,pct:Math.round((score/maxScore)*100),band:band,bandColor:bandColor};
}

// SharePanel Component - Export/Import/Share

function SharePanel({open,onClose,data,onImport}){
  const [importText,setImportText]=useState("");
  const [shareUrl,setShareUrl]=useState("");
  const [importStatus,setImportStatus]=useState("");
  const sm=useIsMobile();

  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`${data.startup_name||"validately"}_backup.json`;
    a.click();URL.revokeObjectURL(url);
  };

  const generateShareLink=()=>{
    try{
      const compressed=btoa(encodeURIComponent(JSON.stringify(data)));
      const url=window.location.origin+window.location.pathname+"#share="+compressed;
      setShareUrl(url);
      navigator.clipboard.writeText(url);
    }catch(e){setShareUrl("Data too large for URL. Use JSON export instead.");}
  };

  const handleImport=()=>{
    try{
      const parsed=JSON.parse(importText);
      if(typeof parsed==="object"&&parsed!==null){
        onImport(parsed);
        setImportStatus("✅ Imported successfully!");
        setImportText("");
      }else{setImportStatus("❌ Invalid format");}
    }catch(e){setImportStatus("❌ Invalid JSON: "+e.message);}
  };

  if(!open)return null;

  return React.createElement("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:sm?16:40}},

          React.createElement("div",{style:{display:"flex",gap:8}},
            React.createElement("button",{onClick:exportJSON,style:{flex:1,padding:"12px 16px",borderRadius:8,background:C.brand,color:C.text,fontSize:12,fontWeight:700,border:"none",cursor:"pointer",minHeight:44}},"💾 Download JSON"),
            React.createElement("button",{onClick:generateShareLink,style:{flex:1,padding:"12px 16px",borderRadius:8,background:C.bg4,color:C.text,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",minHeight:44}},"🔗 Copy Share Link")
          ),
          shareUrl&&React.createElement("div",{style:{marginTop:8,padding:10,background:C.bg,borderRadius:6,fontSize:10,color:C.green,wordBreak:"break-all"}},
            shareUrl.startsWith("http")?"✅ Link copied to clipboard!":shareUrl
          )
        ),
        // Import section
        React.createElement("div",{style:{borderTop:`1px solid ${C.border}`,paddingTop:20}},
          React.createElement("div",{style:{fontSize:13,fontWeight:700,marginBottom:8}},"📥 Import Data"),

function SnapshotPanel({open,onClose,data,onRestore}){
  const [snapshots,setSnapshots]=useState(()=>{
    const saved=localStorage.getItem("validately_snapshots");
    return saved?JSON.parse(saved):[];
  });
  const [customName,setCustomName]=useState("");
  const sm=useIsMobile();

  const saveSnapshot=()=>{
    const name=customName.trim()||`Snapshot — ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"})}`;
    const newSnapshot={id:Date.now(),name:name,date:new Date().toISOString(),data:{...data}};
    const updated=[newSnapshot,...snapshots].slice(0,20);
    setSnapshots(updated);
    localStorage.setItem("validately_snapshots",JSON.stringify(updated));
    setCustomName("");
  };

  const restoreSnapshot=(snapshot)=>{
    onRestore(snapshot.data);
    onClose();
  };

  const deleteSnapshot=(id)=>{
    const updated=snapshots.filter(s=>s.id!==id);

  if(!open)return null;

                  "↩️ Restore"

                React.createElement("button",{onClick:()=>deleteSnapshot(s.id),style:{flex:1,padding:"8px 12px",borderRadius:6,background:C.red+"30",color:C.red,fontSize:10,fontWeight:700,border:"none",cursor:"pointer",minHeight:40}},

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP COMPONENT - Mobile responsive with desktop fallback
// ═══════════════════════════════════════════════════════════════════════════════

function App(){
  const isMobile=useIsMobile();
  const [tab,setTab]=useState("home");
  const [stageIdx,setStageIdx]=useState(0);
  const [data,setData]=useState(()=>{
    const saved=localStorage.getItem("validately_data");
    return saved?JSON.parse(saved):{startup_name:""};
  });
  const [unlocked,setUnlocked]=useState(()=>{
    const saved=localStorage.getItem("validately_unlocked");
    return saved?JSON.parse(saved):[0];
  });
  const [xp,setXP]=useState(()=>parseInt(localStorage.getItem("validately_xp")||"0"));
  const [showSettings,setShowSettings]=useState(false);
  const [apiKey,setApiKey]=useState(localStorage.getItem("validately_apiKey")||"");
  const [genieMessages,setGenieMessages]=useState([]);
  const [isLoading,setIsLoading]=useState(false);
  const [showGenie,setShowGenie]=useState(false);
  const [showSidebar,setShowSidebar]=useState(false);
  const [userPlan,setUserPlan]=useState(localStorage.getItem("validately_plan")||"free");
  const [showPricing,setShowPricing]=useState(false);
  const [showResearch,setShowResearch]=useState(false);
  const [showShare,setShowShare]=useState(false);
  const [showSnapshot,setShowSnapshot]=useState(false);
  const [firedTriggers,setFiredTriggers]=useState(()=>{
    const saved=localStorage.getItem("validately_firedTriggers");
    return saved?new Set(JSON.parse(saved)):new Set();
  });
  const lastChangeRef=useRef(null);

  const update=(k,v)=>{
    const nd={...data,[k]:v};
    setData(nd);
    localStorage.setItem("validately_data",JSON.stringify(nd));
    lastChangeRef.current={field:k,value:v,time:Date.now()};
  };

  const saveSettings=(key)=>{
    setApiKey(key);
    localStorage.setItem("validately_apiKey",key);
    setShowSettings(false);
  };

  const savePlan=(plan)=>{
    setUserPlan(plan);
    localStorage.setItem("validately_plan",plan);
    setShowPricing(false);
  };

  const importData=(imported)=>{
    const merged={...data,...imported};
    setData(merged);
    localStorage.setItem("validately_data",JSON.stringify(merged));
  };

  useEffect(()=>{
    const hash=window.location.hash;
    if(hash.startsWith("#share=")){
      try{
        const decoded=JSON.parse(decodeURIComponent(atob(hash.slice(7))));
        if(typeof decoded==="object"&&decoded!==null){
          importData(decoded);
          window.location.hash="";
        }
      }catch(e){console.log("Invalid share link");}
    }
  },[]);

  const advanceStage=()=>{
    // Auto-snapshot
    const snapshots=JSON.parse(localStorage.getItem("validately_snapshots")||"[]");
    snapshots.unshift({id:Date.now(),name:"Auto — Stage "+(stageIdx+1)+" completed",date:new Date().toISOString(),data:{...data}});
    if(snapshots.length>20)snapshots.pop();
    localStorage.setItem("validately_snapshots",JSON.stringify(snapshots));

    const newXP=xp+STAGES[stageIdx].xp;
    setXP(newXP);
    localStorage.setItem("validately_xp",newXP);
    if(!unlocked.includes(stageIdx+1)){
      const newUnlocked=[...unlocked,stageIdx+1];
      setUnlocked(newUnlocked);
      localStorage.setItem("validately_unlocked",JSON.stringify(newUnlocked));
    }
    if(stageIdx<STAGES.length-1){
      setStageIdx(stageIdx+1);
      setTab("build");
    }
  };

  const sendGenieMessage=async(msg)=>{
    const newMessages=[...genieMessages,{role:"user",content:msg}];
    setGenieMessages(newMessages);
    setIsLoading(true);
    const stageName=STAGES[stageIdx].title;
    const sysMod=`${AI_SYS}\n\nCurrent Stage: ${stageName} (Stage ${stageIdx+1}/7). User data: ${JSON.stringify(data).substring(0,500)}`;
    const response=await askAI(apiKey,sysMod,msg);
    setGenieMessages([...newMessages,{role:"assistant",content:response}]);
    setIsLoading(false);
  };

  // Proactive Genie - auto-fires when key fields reach thresholds
  useEffect(()=>{
    if(!apiKey||isLoading||tab!=="build")return;
    for(const trigger of PROACTIVE_TRIGGERS){
      if(trigger.stage!==stageIdx)continue;
      const val=data[trigger.field]||"";
      const triggerKey=`${trigger.stage}_${trigger.field}`;
      if(val.length>=trigger.minLength&&!firedTriggers.has(triggerKey)){
        setFiredTriggers(prev=>{
          const newSet=new Set([...prev,triggerKey]);
          localStorage.setItem("validately_firedTriggers",JSON.stringify(Array.from(newSet)));
          return newSet;
        });
        setTimeout(async()=>{
          const prompt=trigger.prompt(val,data);
          const stageName=STAGES[stageIdx].title;
          const sysPrompt=`${AI_SYS}\n\nCurrent Stage: ${stageName} (Stage ${stageIdx+1}/7).\nYou are proactively reviewing the user's input. Be specific, reference real startups, include numbers. Start your response with "🧠 Coach Review:" followed by your analysis.\n\nUser data so far: ${JSON.stringify(data).substring(0,800)}`;
          setIsLoading(true);
          setShowGenie(true);
          const genieIntro=`🧠 [Auto-reviewing your ${trigger.field.replace(/_/g,' ')}...]`;
          setGenieMessages(prev=>[...prev,{role:"assistant",content:genieIntro}]);
          const response=await askAI(apiKey,sysPrompt,prompt);
          setGenieMessages(prev=>[...prev,{role:"assistant",content:response}]);
          setIsLoading(false);
        },1500);
        break;
      }
    }
  },[data,stageIdx,apiKey,tab,firedTriggers]);

  // Buzzword detector - fires instantly when buzzwords detected
  useEffect(()=>{
    if(!apiKey||isLoading||!lastChangeRef.current)return;
    const {value,time}=lastChangeRef.current;
    if(Date.now()-time>2000)return;
    for(const trigger of GENIE_TRIGGERS){
      if(trigger.pattern.test(value)){
        const buzzKey=`buzz_${trigger.msg.substring(0,20)}`;
        if(firedTriggers.has(buzzKey))continue;
        setFiredTriggers(prev=>{
          const newSet=new Set([...prev,buzzKey]);
          localStorage.setItem("validately_firedTriggers",JSON.stringify(Array.from(newSet)));
          return newSet;
        });
        setShowGenie(true);
        setGenieMessages(prev=>[...prev,{role:"assistant",content:`⚡ ${trigger.msg}`}]);
        break;
      }
    }
  },[data,firedTriggers,apiKey,isLoading]);

  const lv=getLv(xp);
  const irs=calcIRS(data);

  // Gate check helper
  const gateChecks=(GATE_CRITERIA[stageIdx]||[]).map((gc)=>{
    const val=data[gc.field]||"";
    let pass=false;
    if(gc.check==="required")pass=val.length>0;
    else if(gc.check.startsWith("minLength:"))pass=val.length>=parseInt(gc.check.split(":")[1]);
    else if(gc.check.startsWith("minValue:"))pass=parseFloat(val||0)>=parseFloat(gc.check.split(":")[1]);
    else if(gc.check.startsWith("maxValue:"))pass=parseInt(val||999)<=parseInt(gc.check.split(":")[1]);
    return{...gc,pass};
  });

  // ═══ MOBILE LAYOUT ═══
  if(isMobile){
    return React.createElement("div",{style:{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"system-ui,sans-serif",paddingBottom:apiKey?60:0}},
      // Top bar (mobile)
      React.createElement("div",{style:{position:"sticky",top:0,zIndex:150,background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
          React.createElement("button",{onClick:()=>setShowSidebar(!showSidebar),style:{background:"transparent",border:"none",color:C.text,fontSize:20,cursor:"pointer",padding:4,minWidth:44,minHeight:44,display:"flex",alignItems:"center",justifyContent:"center"}},"☰"),
          React.createElement("div",null,
            React.createElement("div",{style:{fontSize:14,fontWeight:700}},data.startup_name||"Validately"),
            React.createElement("div",{style:{fontSize:10,color:C.text3}},`${lv.ic} ${lv.n} • ${xp} XP`)
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:6}},
          React.createElement("button",{onClick:()=>setShowPricing(true),style:{minWidth:44,minHeight:44,borderRadius:8,background:userPlan==="free"?C.brand+"30":"transparent",color:userPlan==="free"?C.brand:C.green,fontSize:11,fontWeight:700,border:`1px solid ${userPlan==="free"?C.brand:C.green}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}},userPlan==="free"?"⚡ PRO":"✓ "+userPlan.toUpperCase()),
          React.createElement("button",{onClick:()=>setShowSettings(true),style:{minWidth:44,minHeight:44,borderRadius:8,background:C.border,color:C.text,fontSize:16,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}},"⚙️")
        )
      ),

      // Tab bar (mobile)
      React.createElement("div",{style:{display:"flex",background:C.bg2,borderBottom:`1px solid ${C.border}`,overflow:"hidden"}},
        ["home","build","assess"].map(t=>
          React.createElement("button",{
            key:t,
            onClick:()=>setTab(t),
            style:{flex:1,padding:"12px 0",background:tab===t?C.brand+"20":"transparent",color:tab===t?C.brand:C.text3,fontSize:12,fontWeight:700,border:"none",borderBottom:tab===t?`2px solid ${C.brand}`:"2px solid transparent",cursor:"pointer",textTransform:"uppercase",letterSpacing:0.5,minHeight:44}
          },t)
        )
      ),

      // Sidebar overlay (mobile)
      showSidebar&&React.createElement("div",{style:{position:"fixed",inset:0,zIndex:300,display:"flex"}},
        React.createElement("div",{onClick:()=>setShowSidebar(false),style:{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)"}}),
        React.createElement("div",{style:{position:"relative",width:280,background:C.bg2,height:"100%",overflowY:"auto",padding:16,zIndex:1}},
          React.createElement("div",{style:{fontSize:14,fontWeight:700,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}},
            "📍 Stages",
            React.createElement("button",{onClick:()=>setShowSidebar(false),style:{background:"transparent",border:"none",color:C.text3,fontSize:18,cursor:"pointer",minWidth:44,minHeight:44}},"✕")
          ),
          STAGE_META.map(s=>
            React.createElement("button",{
              key:s.id,
              onClick:()=>{if(unlocked.includes(s.id)){setStageIdx(s.id);setTab("build");setShowSidebar(false);}},
              disabled:!unlocked.includes(s.id),
              style:{width:"100%",padding:14,marginBottom:8,borderRadius:8,background:stageIdx===s.id?s.color+"30":C.bg3,border:`1px solid ${stageIdx===s.id?s.color:"transparent"}`,color:C.text,fontSize:13,fontWeight:600,cursor:unlocked.includes(s.id)?"pointer":"not-allowed",opacity:unlocked.includes(s.id)?1:0.4,textAlign:"left",minHeight:44}
            },
              `${s.icon} ${s.phase}`,
              !unlocked.includes(s.id)&&React.createElement("span",{style:{fontSize:10,marginLeft:6}},"🔒")
            )
          ),
          React.createElement("div",{style:{marginTop:20,borderTop:`1px solid ${C.border}`,paddingTop:16}},
            React.createElement(InvestorReadiness,{data:data})
          )
        )
      ),

      // Content (mobile)
      React.createElement("div",{style:{padding:16}},
        tab==="home"&&React.createElement("div",null,
          React.createElement("div",{style:{fontSize:22,fontWeight:700,marginBottom:12}},"🚀 Validately"),
          React.createElement("div",{style:{fontSize:14,lineHeight:1.6,marginBottom:20,color:C.text2}},
            "7 stages from raw idea to investor-ready startup. Built on proven frameworks used by top accelerators."
          ),
          React.createElement("button",{onClick:()=>setShowPricing(true),style:{padding:"8px 16px",borderRadius:8,background:C.brand+"15",border:`1px solid ${C.brand}40`,color:C.brand,fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:16,border:"none"}},"⚡ See Pro & Team plans"),
          React.createElement(InvestorReadiness,{data:data}),
          React.createElement("div",{style:{marginTop:16,display:"flex",flexDirection:"column",gap:10}},
            STAGE_META.map(s=>
              React.createElement("button",{
                key:s.id,
                onClick:()=>{if(unlocked.includes(s.id)){setStageIdx(s.id);setTab("build");}},
                disabled:!unlocked.includes(s.id),
                style:{padding:14,borderRadius:10,background:C.bg3,border:`1px solid ${C.border}`,color:C.text,textAlign:"left",cursor:unlocked.includes(s.id)?"pointer":"not-allowed",opacity:unlocked.includes(s.id)?1:0.4,minHeight:48}
              },
                React.createElement("div",{style:{fontSize:15,fontWeight:700,marginBottom:2}},`${s.icon} ${s.phase}`),
                React.createElement("div",{style:{fontSize:11,color:C.text3}},s.tagline)
              )
            )
          )
        ),

        tab==="build"&&React.createElement("div",null,
          React.createElement("div",{style:{fontSize:18,fontWeight:700,marginBottom:6}},
            `${STAGE_META[stageIdx].icon} ${STAGES[stageIdx].title}`
          ),
          React.createElement("div",{style:{fontSize:12,color:C.text3,marginBottom:16}},STAGES[stageIdx].desc),
          STAGES[stageIdx].render((k)=>data[k]||"",update),
          React.createElement("div",{style:{display:"flex",gap:8,marginTop:16,marginBottom:8}},
            React.createElement("button",{onClick:()=>setShowResearch(true),style:{flex:1,padding:"10px 12px",borderRadius:8,background:C.brand+"20",border:`1px solid ${C.brand}40`,color:C.brand,fontSize:11,fontWeight:600,cursor:"pointer",minHeight:40}},"🔍 AI Research"),
            React.createElement("button",{onClick:()=>generatePDF(data,stageIdx),style:{flex:1,padding:"10px 12px",borderRadius:8,background:C.green+"20",border:`1px solid ${C.green}40`,color:C.green,fontSize:11,fontWeight:600,cursor:"pointer",minHeight:40}},"📄 Report"),
            React.createElement("button",{onClick:()=>generatePitchDeck(data,stageIdx),style:{flex:1,padding:"10px 12px",borderRadius:8,background:C.orange+"20",border:`1px solid ${C.orange}40`,color:C.orange,fontSize:11,fontWeight:600,cursor:"pointer",minHeight:40}},"🎯 Pitch Deck")
          ),
          React.createElement("div",{style:{display:"flex",gap:8,marginTop:8,marginBottom:16}},
            React.createElement("button",{onClick:()=>setShowShare(true),style:{flex:1,padding:"10px 12px",borderRadius:8,background:C.purple+"20",border:`1px solid ${C.purple}40`,color:C.purple,fontSize:11,fontWeight:600,cursor:"pointer",minHeight:40}},"👥 Share"),
            React.createElement("button",{onClick:()=>setShowSnapshot(true),style:{flex:1,padding:"10px 12px",borderRadius:8,background:C.pink+"20",border:`1px solid ${C.pink}40`,color:C.pink,fontSize:11,fontWeight:600,cursor:"pointer",minHeight:40}},"📸 Snapshots"),
            React.createElement("button",{onClick:()=>generatePublicPage(data,stageIdx),style:{flex:1,padding:"10px 12px",borderRadius:8,background:C.teal+"20",border:`1px solid ${C.teal}40`,color:C.teal,fontSize:11,fontWeight:600,cursor:"pointer",minHeight:40}},"🌐 Public Page")
          ),
          React.createElement(MarketplaceTouchpoint,{stage:stageIdx,irs:irs}),
          React.createElement("div",{style:{marginTop:24,padding:16,background:C.bg3,borderRadius:10,border:`1px solid ${C.border}`}},
            React.createElement("div",{style:{fontSize:12,fontWeight:700,color:C.text,marginBottom:12}},
              `📋 Stage ${stageIdx+1} Gate Requirements`
            ),
            gateChecks.map((gc,i)=>
              React.createElement("div",{key:i,style:{display:"flex",gap:8,alignItems:"center",marginBottom:8}},
                React.createElement("span",{style:{fontSize:14,color:gc.pass?C.green:C.red,fontWeight:700}},gc.pass?"✓":"✗"),
                React.createElement("span",{style:{fontSize:11,color:gc.pass?C.text2:C.text3}},gc.msg)
              )
            ),
            React.createElement("div",{style:{display:"flex",gap:8,marginTop:16,flexDirection:"column"}},
              React.createElement("button",{
                onClick:()=>setTab("assess"),
                style:{width:"100%",padding:"12px 16px",borderRadius:8,background:C.brand,color:C.text,fontSize:13,fontWeight:700,border:"none",cursor:"pointer",minHeight:44}

              stageIdx>0&&React.createElement("button",{
                onClick:()=>setStageIdx(stageIdx-1),

          )

        tab==="assess"&&React.createElement(Assess,{stageIdx:stageIdx,data:data,onAdvance:advanceStage})

      // Genie drawer (mobile)
      apiKey&&React.createElement(GeniePanel,{data:data,stageIdx:stageIdx,unlocked:unlocked,onSendMessage:sendGenieMessage,genieMessages:genieMessages,isLoading:isLoading,isMobile:true,showGenie:showGenie,onToggleGenie:()=>setShowGenie(!showGenie)}),
